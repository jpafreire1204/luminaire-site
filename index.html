<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luminaire — Documentos Legais</title>
    <meta name="description"
        content="Documentos legais do aplicativo Luminaire — meditação baseada em evidências para profissionais de saúde.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0A0E1A;
            color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 40px 24px;
            max-width: 480px;
        }

        .app-name {
            color: #C9A96E;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .tagline {
            color: #888;
            font-size: 15px;
            margin-bottom: 48px;
            line-height: 1.5;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .links a {
            display: block;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px 24px;
            color: #FFFFFF;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        .links a:hover {
            background: rgba(201, 169, 110, 0.12);
            border-color: #C9A96E;
        }

        .links a span {
            display: block;
            color: #888;
            font-size: 13px;
            font-weight: 400;
            margin-top: 4px;
        }

        .footer {
            margin-top: 48px;
            color: #555;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="app-name">Luminaire</div>
        <h1>Documentos Legais</h1>
        <p class="tagline">Meditação baseada em evidências para profissionais de saúde</p>
        <div class="links">
            <a href="privacy-policy.html">
                Política de Privacidade
                <span>Como coletamos, usamos e protegemos seus dados</span>
            </a>
            <a href="terms-of-use.html">
                Termos de Uso
                <span>Regras e condições para uso do aplicativo</span>
            </a>
        </div>
        <p class="footer">© 2026 Luminaire. Todos os direitos reservados.</p>
    </div>
</body>

</html>
